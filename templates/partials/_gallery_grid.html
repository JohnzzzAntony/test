{% load static %}
{% if gallery %}
<section class="fd-gallery-section">
  <div class="container">
    <h2 class="fd-section-title text-center">{{ hp_settings.gallery_title|default:"Our Gallery"|safe }}</h2>
    <div class="fd-gallery-grid">
      {% for item in gallery|slice:":8" %}
      <a href="{{ item.get_image_url }}" class="fd-gallery-item {% if forloop.counter == 1 or forloop.counter == 6 %}fd-gallery-wide{% endif %}"
         target="_blank" rel="noopener" title="{{ item.title|default:'Gallery Image' }}">
        <img src="{{ item.get_image_url }}" alt="{{ item.title|default:'Gallery Image' }}" class="fd-gallery-img" loading="lazy">
        {% if item.title %}
        <div class="fd-gallery-caption">{{ item.title }}</div>
        {% endif %}
        <div class="fd-gallery-overlay">
          <i class="fas fa-expand-alt"></i>
        </div>
      </a>
      {% endfor %}
    </div>
  </div>
</section>
{% endif %}
