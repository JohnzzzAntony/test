<!-- Category Products Section Partial -->
<section class="py-5 bg-white">
    <div class="container">
        <div class="text-center mb-5">
            <h2 class="section-title mb-1">{{ section.data.name }}</h2>
            <p class="text-muted mb-3">Discover our latest products in {{ section.data.name }}</p>
            <a href="{% url 'products:category_detail' slug=section.data.slug %}" class="btn btn-outline-primary btn-sm px-4 rounded-full">View All</a>
        </div>
        
        <div class="row">
            {% for product in section.data.aggregated_products %}
            <div class="col-lg-3 col-md-4 col-6 mb-4" data-aos="fade-up" data-aos-delay="{% widthratio forloop.counter0 1 50 %}">
                {% include 'includes/_premium_product_card.html' with product=product %}
            </div>
            {% endfor %}
        </div>
    </div>
</section>
