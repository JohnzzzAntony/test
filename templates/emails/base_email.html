<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block subject %}Email{% endblock %}</title>
  <style>
    body { margin: 0; padding: 0; background-color: #f4f4f7; font-family: 'Segoe UI', Arial, sans-serif; }
    .wrapper { max-width: 600px; margin: 0 auto; padding: 20px; }
    .header { background: #0a0a0a; border-radius: 12px 12px 0 0; padding: 30px 40px; text-align: center; }
    .header img { max-height: 50px; }
    .header h1 { color: #ffffff; font-size: 22px; margin: 10px 0 0; font-weight: 700; letter-spacing: -0.5px; }
    .body { background: #ffffff; padding: 40px; border-left: 1px solid #e8e8e8; border-right: 1px solid #e8e8e8; }
    .body h2 { color: #0a0a0a; font-size: 20px; margin-top: 0; }
    .body p { color: #444; font-size: 15px; line-height: 1.7; }
    .info-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
    .info-table td { padding: 10px 14px; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
    .info-table td:first-child { color: #888; font-weight: 600; width: 40%; }
    .info-table td:last-child { color: #111; font-weight: 500; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .badge-success { background: #d1fae5; color: #065f46; }
    .badge-pending { background: #fef3c7; color: #92400e; }
    .badge-info { background: #dbeafe; color: #1e40af; }
    .btn { display: inline-block; padding: 14px 28px; background: #0a0a0a; color: #ffffff !important; text-decoration: none; border-radius: 8px; font-weight: 700; font-size: 14px; margin: 20px 0; }
    .divider { border: none; border-top: 1px solid #f0f0f0; margin: 24px 0; }
    .footer { background: #f8f8f8; border: 1px solid #e8e8e8; border-radius: 0 0 12px 12px; padding: 24px 40px; text-align: center; }
    .footer p { color: #999; font-size: 12px; margin: 4px 0; }
    .footer a { color: #555; text-decoration: none; }
    .item-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f5f5f5; font-size: 14px; }
    .total-row { display: flex; justify-content: space-between; padding: 14px 0; font-size: 16px; font-weight: 700; color: #0a0a0a; }
    @media (max-width: 600px) {
      .wrapper { padding: 10px; }
      .header, .body, .footer { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>{{ site_name }}</h1>
    </div>
    <div class="body">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      <p>© {{ site_name }}. All rights reserved.</p>
      <p><a href="{{ site_url }}">{{ site_url }}</a></p>
      <p style="margin-top:12px; color:#bbb; font-size:11px;">You received this email because you have an account or placed an order with us.</p>
    </div>
  </div>
</body>
</html>
