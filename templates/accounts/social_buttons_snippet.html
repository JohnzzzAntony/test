<div style="margin: 24px 0; text-align: center;">
  <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">
    <hr style="flex:1; border-color:#dee2e6;">
    <span style="color:#6c757d; font-size:0.85rem; white-space:nowrap;">or continue with</span>
    <hr style="flex:1; border-color:#dee2e6;">
  </div>

  <div style="display: flex; flex-direction: column; gap: 10px;">

    {% comment %}
    {# ── Google ───────────────────────────────────────────────────────────── #}
    <style>
      .social-login-google:hover { background: #f8f9fa !important; }
    </style>
    <a href="{% url 'accounts:social_login' 'google' %}"
       class="social-login-google"
       style="display:flex;align-items:center;justify-content:center;gap:10px;
              padding:10px 16px;border:1px solid #dadce0;border-radius:6px;
              background:#fff;color:#3c4043;font-size:14px;font-weight:500;
              text-decoration:none;transition:background .15s;">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908C16.658 14.149 17.64 11.84 17.64 9.2z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      Continue with Google
    </a>
    {% endcomment %}

  </div>
</div>
