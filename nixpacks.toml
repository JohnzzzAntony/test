# Force Python-only provider.
# Prevents Nixpacks from detecting package.json and mixing Node + Python.
providers = ["python"]

# DO NOT override [phases.install] — Nixpacks automatically creates a
# virtualenv and runs pip install -r requirements.txt inside it.
# Overriding it breaks the virtualenv and causes pip3 to try to install
# into the Nix-managed (read-only) system Python, which fails with
# "externally-managed-environment".

[phases.build]
cmds = ["python manage.py collectstatic --noinput --clear"]

[start]
cmd = "bash start.sh"
