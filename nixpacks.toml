# Explicitly declare Python via Nix packages.
# 'providers' alone is sometimes ignored when package.json is present.
# Declaring nixPkgs forces the correct Python + pip3 environment.
providers = ["python"]

[phases.setup]
nixPkgs = [
  "python311",
  "python311Packages.pip",
  "python311Packages.setuptools",
  "python311Packages.wheel"
]

[phases.install]
cmds = ["pip3 install --no-cache-dir -r requirements.txt"]

[phases.build]
cmds = ["python manage.py collectstatic --noinput --clear"]

[start]
cmd = "python manage.py migrate --noinput && gunicorn jkr.wsgi:application --bind 0.0.0.0:$PORT --timeout 120 --workers 2 --log-file - --access-logfile - --error-logfile -"
