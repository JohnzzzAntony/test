{% extends 'base.html' %}
{% load static %}

{% block meta_title %}Edit Plan | Admin{% endblock %}

{% block content %}
<section class="py-12 bg-slate-50/50 min-h-screen">
    <div class="max-w-2xl mx-auto px-6 lg:px-8">
        
        {# Header #}
        <div class="flex items-center gap-3 mb-8">
            <a href="{% url 'subscriptions:admin_plans' %}" class="w-10 h-10 rounded-xl bg-white shadow-sm border border-slate-200 flex items-center justify-center text-slate-400 hover:text-primary hover:border-primary transition-all">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div>
                <h1 class="text-2xl md:text-3xl font-black text-slate-900 tracking-tight">
                    Edit <span class="text-primary">Plan</span>
                </h1>
                <p class="text-slate-500 text-sm">Update subscription plan details</p>
            </div>
        </div>

        {# Edit Form #}
        <div class="bg-white rounded-3xl p-8 shadow-sm border border-slate-200">
            <form method="POST" action="{% url 'subscriptions:admin_edit_plan' plan.id %}">
                {% csrf_token %}
                
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-widest mb-2">Plan Name *</label>
                        <input type="text" name="name" value="{{ plan.name }}" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-widest mb-2">Description</label>
                        <textarea name="description" rows="3" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all resize-none">{{ plan.description }}</textarea>
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-widest mb-2">Stripe Price ID *</label>
                        <input type="text" name="stripe_price_id" value="{{ plan.stripe_price_id }}" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all font-mono text-sm">
                    </div>
                    
                    <div class="grid grid-cols-3 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-700 uppercase tracking-widest mb-2">Price *</label>
                            <input type="number" name="price" step="0.01" min="0" value="{{ plan.price }}" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-700 uppercase tracking-widest mb-2">Currency</label>
                            <select name="currency" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
                                <option value="USD" {% if plan.currency == 'USD' %}selected{% endif %}>USD</option>
                                <option value="EUR" {% if plan.currency == 'EUR' %}selected{% endif %}>EUR</option>
                                <option value="GBP" {% if plan.currency == 'GBP' %}selected{% endif %}>GBP</option>
                                <option value="AED" {% if plan.currency == 'AED' %}selected{% endif %}>AED</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-700 uppercase tracking-widest mb-2">Interval</label>
                            <select name="interval" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
                                <option value="month" {% if plan.interval == 'month' %}selected{% endif %}>Monthly</option>
                                <option value="year" {% if plan.interval == 'year' %}selected{% endif %}>Yearly</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-3">
                        <input type="checkbox" name="is_active" id="is_active" {% if plan.is_active %}checked{% endif %} class="w-5 h-5 rounded border-slate-300 text-primary focus:ring-primary">
                        <label for="is_active" class="text-sm font-semibold text-slate-700">Plan is active and available for subscription</label>
                    </div>
                </div>
                
                <div class="flex gap-4 mt-8 pt-6 border-t border-slate-100">
                    <a href="{% url 'subscriptions:admin_plans' %}" class="flex-1 px-6 py-4 bg-slate-100 text-slate-700 font-bold text-center rounded-xl hover:bg-slate-200 transition-all">
                        Cancel
                    </a>
                    <button type="submit" class="flex-1 px-6 py-4 bg-primary text-white font-bold rounded-xl hover:bg-secondary transition-all shadow-lg shadow-primary/20">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>

    </div>
</section>
{% endblock %}
